    <style>
        /* EPIC BACKGROUND */
        .epic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        /* GALAXY LAYER */
        .galaxy-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 100, 255, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(200, 50, 50, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at center, #0a0015 0%, #000005 100%);
            animation: galaxyPulse 8s ease-in-out infinite alternate;
        }

        @keyframes galaxyPulse {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        /* STARS */
        .stars-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 10% 15%, white, transparent),
                radial-gradient(1px 1px at 25% 40%, white, transparent),
                radial-gradient(1px 1px at 40% 10%, white, transparent),
                radial-gradient(1px 1px at 55% 60%, white, transparent),
                radial-gradient(1px 1px at 70% 25%, white, transparent),
                radial-gradient(1px 1px at 85% 75%, white, transparent),
                radial-gradient(1px 1px at 15% 80%, white, transparent),
                radial-gradient(1px 1px at 90% 45%, white, transparent),
                radial-gradient(1px 1px at 35% 90%, white, transparent),
                radial-gradient(1px 1px at 60% 5%, white, transparent),
                radial-gradient(2px 2px at 45% 35%, rgba(255,255,200,0.8), transparent),
                radial-gradient(2px 2px at 75% 55%, rgba(255,255,200,0.8), transparent),
                radial-gradient(2px 2px at 20% 65%, rgba(255,255,200,0.8), transparent);
            animation: starsTwinkle 4s ease-in-out infinite alternate;
        }

        @keyframes starsTwinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* FIRE LAYER BOTTOM */
        .fire-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 300px;
            background: 
                radial-gradient(ellipse at 20% 100%, rgba(255, 80, 0, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(255, 150, 0, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(255, 50, 0, 0.4) 0%, transparent 60%);
            animation: firePulse 3s ease-in-out infinite alternate;
        }

        @keyframes firePulse {
            0% { 
                opacity: 0.6;
                transform: scaleY(1);
            }
            100% { 
                opacity: 1;
                transform: scaleY(1.1);
            }
        }

        /* NEBULA LAYER */
        .nebula-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 10% 30%, rgba(150, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 90% 70%, rgba(255, 100, 0, 0.15) 0%, transparent 40%);
            animation: nebulaMove 12s ease-in-out infinite alternate;
        }

        @keyframes nebulaMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-20px, -20px); }
        }

        /* PARTICLES */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }
    </style>
