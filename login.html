    <div class="login-box">

        <h1>LOGIN</h1>
        <p class="login-sub">PREPARE for The EPIC WARS</p>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">ENTER</button>

        <p>OR LOGIN WITH</p>

        <div class="social-login">
            <button onclick="socialLogin('Google')">Google</button>
            <button onclick="socialLogin('Facebook')">Facebook</button>
            <button onclick="socialLogin('Microsoft')">Microsoft</button>
        </div>

        <div class="login-page">
            <div class="login-left">
                <!-- your login-box -->
            </div>

        </div>

    </div>

    <div style="text-align: center; margin-top: 50px;">
        <img src="stickman_elements.png"
             style="width: 1000px;
              border-radius: 15px;
              border: 2px solid yellow;
              animation: rainbowBorder 3s linear infinite;">  
    </div>
